name: Keep Backend Alive (Render Free Plan)

on:
  schedule:
    # 매 10분마다 실행 (UTC 기준) - Render 무료 플랜 15분 슬립 방지
    - cron: '*/10 * * * *'
  workflow_dispatch: # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health Endpoint
        run: |
          echo "⏰ $(date) - Pinging Safe-Trade AI Backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://safe-trade-ai-backend.onrender.com/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive! (HTTP $STATUS)"
          else
            echo "⚠️ Backend responded with HTTP $STATUS (may be waking up from sleep)"
          fi
